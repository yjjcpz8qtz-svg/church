<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- 아이콘: 대한예수교장로회 통합 측 공식 마크 적용 -->
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/pck-main/pck-main.github.io/main/pck_logo.png">
    <link rel="shortcut icon" href="https://raw.githubusercontent.com/pck-main/pck-main.github.io/main/pck_logo.png">
    
    <title>화곡동교회</title>
    <style>
        :root { --point-color: #c62828; --bg-color: #f9f9f9; } /* 교단 마크에 맞춘 붉은색 포인트 */
        body { font-family: 'Malgun Gothic', sans-serif; background-color: var(--bg-color); margin: 0; padding: 0; text-align: center; }
        .header { background: #fff; padding: 15px 10px; border-bottom: 3px solid var(--point-color); position: sticky; top: 0; z-index: 10; }
        .header b { font-size: 1.15rem; color: var(--point-color); word-break: keep-all; line-height: 1.3; display: block; }
        .container { max-width: 500px; margin: 0 auto; padding: 15px; }
        .video-box { width: 100%; border-radius: 20px; overflow: hidden; background: #000; box-shadow: 0 8px 15px rgba(0,0,0,0.1); margin-bottom: 20px; position: relative; padding-bottom: 56.25%; height: 0; }
        .video-box iframe { position: absolute; top:0; left:0; width: 100%; height: 100%; border: none; }
        .message-card { background: white; border-radius: 20px; padding: 25px 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        #display-verse { font-size: 1.4rem; font-weight: 800; line-height: 1.5; word-break: keep-all; margin: 0; color: #1a1a1a; }
        .guestbook-section { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: left; margin-bottom: 30px; }
        .guestbook-title { font-weight: bold; font-size: 1.1rem; color: var(--point-color); margin-bottom: 10px; }
        .input-group { display: flex; gap: 8px; margin-bottom: 15px; }
        .input-group input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 1rem; }
        .btn-send { padding: 0 15px; background: var(--point-color); color: white; border: none; border-radius: 10px; font-weight: bold; }
        .comment-list { max-height: 200px; overflow-y: auto; }
        .comment-item { padding: 8px 0; border-bottom: 1px dashed #eee; font-size: 0.95rem; }
        .btn { width: 100%; padding: 18px; border: none; border-radius: 15px; font-size: 1.2rem; font-weight: bold; background: var(--point-color); color: white; cursor: pointer; }
        .admin-link { display: block; margin-top: 30px; color: #ccc; font-size: 0.8rem; text-decoration: underline; cursor: pointer; }
        #admin-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 100; padding: 20px; box-sizing: border-box; }
        .admin-input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
    </style>
</head>
<body>
    <div class="header">
        <b>은혜로 하나되어 사랑으로 세워가는 <br>화곡동교회</b>
    </div>
    <div class="container">
        <div id="video-display" class="video-box"></div>
        <div class="message-card"><p id="display-verse">오늘도 주님의 은혜가 가득하시길 소망합니다.</p></div>
        <div class="guestbook-section">
            <div class="guestbook-title">† 성도님 은혜의 한마디</div>
            <div class="input-group">
                <input type="text" id="visitor-message" placeholder="은혜를 나누어주세요">
                <button class="btn-send" onclick="addComment()">등록</button>
            </div>
            <div id="comment-list" class="comment-list"></div>
        </div>
        <button class="btn" onclick="alert('주님의 이름으로 축복합니다. 아멘!')">🙏 아멘</button>
        <span class="admin-link" onclick="openAdmin()">영상 및 말씀 관리</span>
    </div>

    <div id="admin-modal">
        <h3>콘텐츠 관리 (화곡동교회)</h3>
        <input type="text" id="input-url" class="admin-input" placeholder="영상 주소">
        <textarea id="input-verse" class="admin-input" rows="5" placeholder="말씀 문구"></textarea>
        <button class="btn" onclick="saveData()">저장 후 적용</button>
        <button class="btn" style="background:#ccc; margin-top:10px;" onclick="closeAdmin()">취소</button>
    </div>

    <script>
        window.onload = function() { loadContent(); displayComments(); };
        function loadContent() {
            let url = localStorage.getItem('church_url') || "";
            document.getElementById('display-verse').innerText = localStorage.getItem('church_verse') || "반갑습니다.";
            const display = document.getElementById('video-display');
            if (!url) { display.innerHTML = '<p style="color:white; padding-top:20%;">영상을 등록해주세요.</p>'; return; }
            let embedUrl = "";
            if (url.includes('tv.naver.com') || url.includes('naver.me')) {
                const vid = url.match(/\/v\/([0-9]+)/);
                if (vid) embedUrl = `https://tv.naver.com/embed/${vid[1]}?autoPlay=false`;
            } else if (url.includes('youtu')) {
                const yid = url.match(/(?:youtu\.be\/|youtube\.com(?:\/embed\/|\/v\/|\/watch\?v=|\/user\/\S+|\/shorts\/))([\w\-]{11})/);
                if (yid) embedUrl = `https://www.youtube.com/embed/${yid[1]}`;
            }
            if (embedUrl) { display.innerHTML = `<iframe src="${embedUrl}" allowfullscreen></iframe>`; }
        }
        function addComment() {
            const message = document.getElementById('visitor-message').value;
            if (!message) return;
            const comments = JSON.parse(localStorage.getItem('church_comments') || "[]");
            comments.unshift({ message: message, date: new Date().toLocaleString() });
            localStorage.setItem('church_comments', JSON.stringify(comments));
            document.getElementById('visitor-message').value = "";
            displayComments();
        }
        function displayComments() {
            const comments = JSON.parse(localStorage.getItem('church_comments') || "[]");
            document.getElementById('comment-list').innerHTML = comments.map(c => `<div class="comment-item">▶ ${c.message}</div>`).join('');
        }
        function openAdmin() {
            if (prompt("비밀번호 1234") === "1234") {
                document.getElementById('admin-modal').style.display = 'block';
                document.getElementById('input-url').value = localStorage.getItem('church_url') || "";
                document.getElementById('input-verse').value = localStorage.getItem('church_verse') || "";
            }
        }
        function closeAdmin() { document.getElementById('admin-modal').style.display = 'none'; }
        function saveData() {
            localStorage.setItem('church_url', document.getElementById('input-url').value);
            localStorage.setItem('church_verse', document.getElementById('input-verse').value);
            alert("화곡동교회 데이터가 저장되었습니다.");
            location.reload();
        }
    </script>
</body>
</html>
