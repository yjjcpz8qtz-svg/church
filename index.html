<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>우리 교회</title>
    <style>
        :root { --point-color: #2e7d32; --bg-color: #f4f7f4; }
        body { font-family: 'Malgun Gothic', sans-serif; background-color: var(--bg-color); margin: 0; padding: 0; text-align: center; }
        .header { background: #fff; padding: 15px 10px; border-bottom: 3px solid var(--point-color); position: sticky; top: 0; z-index: 10; }
        .header b { font-size: 1.1rem; color: var(--point-color); word-break: keep-all; line-height: 1.3; display: block; }
        .container { max-width: 500px; margin: 0 auto; padding: 15px; }
        .video-box { width: 100%; border-radius: 20px; overflow: hidden; background: #000; box-shadow: 0 8px 15px rgba(0,0,0,0.1); margin-bottom: 20px; position: relative; aspect-ratio: 16/9; }
        .video-box iframe { position: absolute; top:0; left:0; width: 100%; height: 100%; border: none; }
        .message-card { background: white; border-radius: 20px; padding: 25px 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        #display-verse { font-size: 1.5rem; font-weight: 800; line-height: 1.5; word-break: keep-all; margin: 0; color: #1a1a1a; }
        .guestbook-section { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: left; margin-bottom: 30px; }
        .guestbook-title { font-weight: bold; font-size: 1.1rem; color: var(--point-color); margin-bottom: 15px; }
        .input-group { display: flex; gap: 8px; margin-bottom: 15px; }
        .input-group input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 1rem; }
        .btn-send { padding: 0 15px; background: var(--point-color); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .comment-list { max-height: 250px; overflow-y: auto; }
        .comment-item { padding: 10px 0; border-bottom: 1px dashed #eee; font-size: 0.95rem; }
        .btn { width: 100%; padding: 18px; border: none; border-radius: 15px; font-size: 1.3rem; font-weight: bold; background: var(--point-color); color: white; cursor: pointer; }
        .admin-link { display: block; margin-top: 30px; color: #bbb; font-size: 0.8rem; text-decoration: underline; cursor: pointer; }
        #admin-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 100; padding: 20px; box-sizing: border-box; }
        .admin-input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
    </style>
</head>
<body>
    <div class="header"><b>은혜로 하나되어 사랑으로 세워가는 우리</b></div>
    <div class="container">
        <div id="video-display" class="video-box">
            <p style="color:white; padding-top:20%;">관리자 모드에서 주소를 등록해주세요.</p>
        </div>
        <div class="message-card"><p id="display-verse">반갑습니다!</p></div>
        <div class="guestbook-section">
            <div class="guestbook-title">† 성도님 은혜의 한마디</div>
            <div class="input-group">
                <input type="text" id="visitor-message" placeholder="은혜의 한마디를 남겨주세요">
                <button class="btn-send" onclick="addComment()">등록</button>
            </div>
            <div id="comment-list" class="comment-list"></div>
        </div>
        <button class="btn" onclick="alert('주님의 이름으로 기도합니다. 아멘!')">🙏 아멘</button>
        <span class="admin-link" onclick="openAdmin()">영상 및 말씀 관리</span>
    </div>

    <div id="admin-modal">
        <h3>콘텐츠 업데이트</h3>
        <input type="text" id="input-url" class="admin-input" placeholder="네이버TV 주소를 넣어주세요">
        <textarea id="input-verse" class="admin-input" rows="5" placeholder="말씀 문구"></textarea>
        <button class="btn" onclick="saveData()">저장 후 적용</button>
        <button class="btn" style="background:#ccc; margin-top:10px;" onclick="closeAdmin()">취소</button>
    </div>

    <script>
        window.onload = function() { loadContent(); displayComments(); };

        function loadContent() {
            let url = localStorage.getItem('church_url') || "";
            const verse = localStorage.getItem('church_verse') || "평안한 하루 되세요.";
            const display = document.getElementById('video-display');
            document.getElementById('display-verse').innerText = verse;

            if (!url) return;

            let vid = "";
            // 네이버TV 주소에서 숫자만 완벽하게 뽑아내는 특수 필터
            const naverMatch = url.match(/\/v\/([0-9]+)/) || url.match(/naver\.me\/([0-9a-zA-Z]+)/);
            
            if (url.includes('naver')) {
                if (naverMatch) {
                    vid = naverMatch[1];
                    // 네이버TV 엠베드 전용 주소로 강제 변환 (카톡 보안 우회)
                    display.innerHTML = `<iframe src="https://tv.naver.com/embed/${vid}?autoPlay=false" allowfullscreen></iframe>`;
                } else {
                    // 주소 형식이 특이할 경우 직접 아이디만 추출 시도
                    vid = url.split('/').pop().split('?')[0];
                    display.innerHTML = `<iframe src="https://tv.naver.com/embed/${vid}?autoPlay=false" allowfullscreen></iframe>`;
                }
            } else if (url.includes('youtu')) {
                const yMatch = url.match(/(?:youtu\.be\/|youtube\.com(?:\/embed\/|\/v\/|\/watch\?v=|\/user\/\S+|\/shorts\/))([\w\-]{11})/);
                if (yMatch) display.innerHTML = `<iframe src="https://www.youtube.com/embed/${yMatch[1]}" allowfullscreen></iframe>`;
            }
        }

        function addComment() {
            const message = document.getElementById('visitor-message').value;
            if (!message) return;
            const comments = JSON.parse(localStorage.getItem('church_comments') || "[]");
            comments.unshift({ message: message, date: new Date().toLocaleString('ko-KR', { month: 'numeric', day: 'numeric', hour: 'numeric', minute: 'numeric' }) });
            localStorage.setItem('church_comments', JSON.stringify(comments));
            document.getElementById('visitor-message').value = "";
            displayComments();
        }

        function displayComments() {
            const comments = JSON.parse(localStorage.getItem('church_comments') || "[]");
            document.getElementById('comment-list').innerHTML = comments.map(c => `<div class="comment-item">▶ ${c.message} <span style="font-size:0.7rem; color:#aaa; float:right;">${c.date}</span></div>`).join('');
        }

        function openAdmin() {
            if (prompt("비밀번호 1234") === "1234") {
                document.getElementById('admin-modal').style.display = 'block';
                document.getElementById('input-url').value = localStorage.getItem('church_url') || "";
                document.getElementById('input-verse').value = localStorage.getItem('church_verse') || "";
            }
        }
        function closeAdmin() { document.getElementById('admin-modal').style.display = 'none'; }
        function saveData() {
            localStorage.setItem('church_url', document.getElementById('input-url').value);
            localStorage.setItem('church_verse', document.getElementById('input-verse').value);
            alert("저장되었습니다.");
            location.reload();
        }
    </script>
</body>
</html>
